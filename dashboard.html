<!DOCTYPE html>
<html>
<head>
  <title>Flowlytics Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="nav">
  <div class="logo">
    <div class="dot"></div>
    <h2>Flowlytics</h2>
  </div>

  <div class="links">
    <a href="index.html">Home</a>
    <a href="features.html">Features</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
</header>

<section class="hero">
  <h1>Analytics Dashboard</h1>
  <p>Live interaction insights (demo data)</p>
</section>

<!-- STATS -->
<div class="stats">
  <div class="box">Clicks: <span id="clickCount">0</span></div>
  <div class="box">Page Views: <span id="viewCount">0</span></div>
  <div class="box">Forms: <span id="formCount">0</span></div>
</div>

<!-- CHARTS -->
<div class="chart-container">
  <canvas id="clickChart"></canvas>
</div>

<div class="chart-container">
  <canvas id="pageChart"></canvas>
</div>

<script src="tracker.js"></script>

</body>
</html>
